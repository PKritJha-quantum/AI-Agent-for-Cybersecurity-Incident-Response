<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AI Agent for Cybersecurity Incident Response — System Architecture</title>
  <desc>Four-layer architecture: Client (browser UI), Server (Flask app.py with API routes), AI/Logic layer (threat simulator, log parser, remediation), and Database/Storage layer (raw logs, cleaned CSV, blacklist, config).</desc>
  <defs>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; fill: #444; }
      .layer-label { font-size: 15px; font-weight: 700; }
      .layer-sub   { font-size: 12px; fill: #555; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════
       LAYER 1 — CLIENT
  ═══════════════════════════════════════ -->
  <rect x="40" y="30" width="600" height="130" rx="16"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text class="layer-label" x="340" y="58" text-anchor="middle" fill="#0C447C">Client layer</text>
  <text class="layer-sub"   x="340" y="75" text-anchor="middle">Browser / frontend UI</text>

  <rect x="68"  y="86" width="160" height="54" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="148" y="107" text-anchor="middle" fill="#042C53">Input box</text>
  <text class="ts" x="148" y="125" text-anchor="middle">User prompt entry</text>

  <rect x="260" y="86" width="160" height="54" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="107" text-anchor="middle" fill="#042C53">Submit button</text>
  <text class="ts" x="340" y="125" text-anchor="middle">Trigger POST /api/chat</text>

  <rect x="452" y="86" width="160" height="54" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="532" y="107" text-anchor="middle" fill="#042C53">Response area</text>
  <text class="ts" x="532" y="125" text-anchor="middle">Displays AI output</text>

  <!-- ── Arrow Client ↕ Server ── -->
  <line x1="270" y1="162" x2="270" y2="206" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="206" x2="290" y2="162" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="306" y="188" text-anchor="start">HTTP requests / JSON responses</text>

  <!-- ══════════════════════════════════════
       LAYER 2 — SERVER
  ═══════════════════════════════════════ -->
  <rect x="40" y="210" width="600" height="188" rx="16"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text class="layer-label" x="340" y="238" text-anchor="middle" fill="#3C3489">Server layer</text>
  <text class="layer-sub"   x="340" y="255" text-anchor="middle">Flask (src/app.py) — runs on localhost:5000</text>

  <!-- 5 route boxes -->
  <rect x="58"  y="264" width="102" height="52" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="109" y="284" text-anchor="middle" fill="#26215C">POST</text>
  <text class="ts" x="109" y="302" text-anchor="middle" fill="#3C3489">/api/chat</text>

  <rect x="172" y="264" width="102" height="52" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="223" y="284" text-anchor="middle" fill="#26215C">GET</text>
  <text class="ts" x="223" y="302" text-anchor="middle" fill="#3C3489">/api/history</text>

  <rect x="286" y="264" width="102" height="52" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="337" y="284" text-anchor="middle" fill="#26215C">GET</text>
  <text class="ts" x="337" y="302" text-anchor="middle" fill="#3C3489">/api/users</text>

  <rect x="400" y="264" width="102" height="52" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="451" y="284" text-anchor="middle" fill="#26215C">POST</text>
  <text class="ts" x="451" y="302" text-anchor="middle" fill="#3C3489">/api/feedback</text>

  <rect x="514" y="264" width="108" height="52" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="568" y="284" text-anchor="middle" fill="#26215C">GET</text>
  <text class="ts" x="568" y="302" text-anchor="middle" fill="#3C3489">/api/health</text>

  <!-- security_config row -->
  <rect x="58" y="330" width="584" height="52" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="th" x="350" y="352" text-anchor="middle" fill="#2C2C2A">security_config.json</text>
  <text class="ts" x="350" y="370" text-anchor="middle" fill="#444441">Trusted IPs · thresholds · severity levels · allowed ports</text>

  <!-- ── Arrow Server ↕ AI/Logic ── -->
  <line x1="270" y1="400" x2="270" y2="442" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="442" x2="290" y2="400" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="306" y="424" text-anchor="start">Calls pipeline modules</text>

  <!-- ══════════════════════════════════════
       LAYER 3 — AI / LOGIC
  ═══════════════════════════════════════ -->
  <rect x="40" y="446" width="600" height="158" rx="16"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text class="layer-label" x="340" y="474" text-anchor="middle" fill="#085041">AI / logic layer</text>
  <text class="layer-sub"   x="340" y="491" text-anchor="middle">Python pipeline modules (src/)</text>

  <rect x="60"  y="502" width="172" height="80" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="146" y="524" text-anchor="middle" fill="#04342C">threat_simulator.py</text>
  <text class="ts" x="146" y="542" text-anchor="middle" fill="#085041">Generates 200 synthetic</text>
  <text class="ts" x="146" y="558" text-anchor="middle" fill="#085041">security log events</text>

  <rect x="254" y="502" width="172" height="80" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="524" text-anchor="middle" fill="#04342C">log_parser.py</text>
  <text class="ts" x="340" y="542" text-anchor="middle" fill="#085041">Validates &amp; cleans</text>
  <text class="ts" x="340" y="558" text-anchor="middle" fill="#085041">raw logs → CSV</text>

  <rect x="448" y="502" width="174" height="80" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="535" y="524" text-anchor="middle" fill="#04342C">remediation_control.py</text>
  <text class="ts" x="535" y="542" text-anchor="middle" fill="#085041">Evaluates anomalies,</text>
  <text class="ts" x="535" y="558" text-anchor="middle" fill="#085041">blocks malicious IPs</text>

  <!-- arrows between modules -->
  <line x1="234" y1="542" x2="252" y2="542" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="428" y1="542" x2="446" y2="542" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Arrow AI/Logic ↕ Database ── -->
  <line x1="270" y1="606" x2="270" y2="648" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="648" x2="290" y2="606" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="306" y="630" text-anchor="start">Reads / writes files</text>

  <!-- ══════════════════════════════════════
       LAYER 4 — DATABASE / STORAGE
  ═══════════════════════════════════════ -->
  <rect x="40" y="652" width="600" height="146" rx="16"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text class="layer-label" x="340" y="680" text-anchor="middle" fill="#633806">Database / storage layer</text>
  <text class="layer-sub"   x="340" y="697" text-anchor="middle">File-based persistence (data/)</text>

  <rect x="58"  y="708" width="130" height="68" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="123" y="730" text-anchor="middle" fill="#412402">raw_logs.txt</text>
  <text class="ts" x="123" y="748" text-anchor="middle" fill="#633806">Simulated threat</text>
  <text class="ts" x="123" y="763" text-anchor="middle" fill="#633806">events (200 lines)</text>

  <rect x="206" y="708" width="136" height="68" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="274" y="730" text-anchor="middle" fill="#412402">cleaned_logs.csv</text>
  <text class="ts" x="274" y="748" text-anchor="middle" fill="#633806">Validated log</text>
  <text class="ts" x="274" y="763" text-anchor="middle" fill="#633806">records (CSV)</text>

  <rect x="360" y="708" width="150" height="68" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="435" y="730" text-anchor="middle" fill="#412402">firewall_blacklist.txt</text>
  <text class="ts" x="435" y="748" text-anchor="middle" fill="#633806">Blocked malicious</text>
  <text class="ts" x="435" y="763" text-anchor="middle" fill="#633806">IPs + timestamps</text>

  <rect x="528" y="708" width="114" height="68" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="585" y="730" text-anchor="middle" fill="#412402">security_config.json</text>
  <text class="ts" x="585" y="748" text-anchor="middle" fill="#633806">Thresholds &amp;</text>
  <text class="ts" x="585" y="763" text-anchor="middle" fill="#633806">trusted IPs</text>
</svg>
